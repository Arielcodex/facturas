<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arielcodex - Admin Panel</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        :root { --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #1f2937; }
        .dark-mode { --bg-color: #111827; --card-bg: #1f2937; --text-main: #f9fafb; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: all 0.3s ease; min-height: 100vh; }
        .glass { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-extrabold tracking-tight text-blue-500">ARIELCODEX<span class="text-gray-400 font-light">.sys</span></h1>
            <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 transition-colors">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
        
        <div class="glass rounded-3xl p-6 shadow-xl mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-xs uppercase tracking-widest text-gray-500 font-bold">Base de Datos</p>
                    <h2 class="text-sm text-gray-400">Total de facturas cargadas</h2>
                </div>
                <div id="contador" class="text-4xl font-black text-blue-500">0</div>
            </div>
            <div class="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-1.5">
                <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div class="glass rounded-3xl p-6 shadow-xl space-y-4">
            <div id="reader" class="rounded-2xl overflow-hidden mb-2 bg-black"></div>
            
            <button onclick="startScanner()" class="w-full py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                📸 Escanear Código
            </button>

            <div class="space-y-3">
                <input type="text" id="nroFactura" placeholder="N° de Factura" class="w-full p-4 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="proveedor" placeholder="Proveedor / Empresa" class="w-full p-4 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="descripcion" placeholder="Descripción breve" class="w-full p-4 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                <div class="relative">
                    <span class="absolute left-4 top-4 text-green-500 font-bold">$</span>
                    <input type="number" id="precio" placeholder="0.00" class="w-full p-4 pl-8 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold text-green-500">
                </div>
            </div>
            
            <button onclick="enviarDatos()" id="btnEnviar" class="w-full py-4 rounded-2xl bg-green-500 text-white font-black text-lg shadow-lg hover:bg-green-600 transition-colors flex justify-center items-center">
                GUARDAR REGISTRO
            </button>
        </div>

        <div class="mt-6">
            <input type="text" id="busqueda" placeholder="🔍 Buscar facturas..." class="w-full p-4 bg-transparent border-b-2 border-gray-300 dark:border-gray-700 focus:border-blue-500 outline-none">
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-nua5x1TEV3bPT9X6F6lOauMFHxU7BaGneWPyy-LMvp42CzVfBiicQ1OWyzqkfV2TPg/exec";
        let historialFacturas = [];

        // Función para cargar el historial al abrir la app
        async function cargarHistorial() {
            try {
                const response = await fetch(API_URL);
                historialFacturas = await response.json();
                document.getElementById('contador').innerText = historialFacturas.length;
                document.getElementById('progress-bar').style.width = Math.min(historialFacturas.length * 2, 100) + '%';
            } catch (e) { 
                console.log("Error cargando historial"); 
            }
        }

        // Llamar al cargar cuando abre la app
        window.onload = cargarHistorial;

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        function startScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                document.getElementById('nroFactura').value = text;
                html5QrCode.stop();
                navigator.vibrate(100);
            });
        }

        async function enviarDatos() {
            const btn = document.getElementById('btnEnviar');
            const nro = document.getElementById('nroFactura').value;
            const prov = document.getElementById('proveedor').value;
            const desc = document.getElementById('descripcion').value;
            const precio = document.getElementById('precio').value;

            if(!nro || !precio) {
                alert("N° de factura y Precio son obligatorios.");
                return;
            }

            // --- ALERTA DE DUPLICADOS ---
            const existe = historialFacturas.find(f => f.nroFactura == nro);
            if (existe) {
                alert("⚠️ ATENCIÓN: Esta factura ya fue cargada anteriormente para el proveedor: " + existe.proveedor);
                if (!confirm("¿Deseas cargarla de todas formas?")) return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6"></div>`;

            const payload = {
                nroFactura: nro,
                proveedor: prov,
                descripcion: desc,
                precio: precio
            };

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });
                
                alert("✅ ¡Factura guardada exitosamente!");
                limpiarFormulario();
                await cargarHistorial(); // Refrescar historial local y contador
            } catch (error) {
                alert("❌ Error al guardar. Verifica tu conexión.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "GUARDAR REGISTRO";
            }
        }

        function limpiarFormulario() {
            ['nroFactura','proveedor','descripcion','precio'].forEach(id => {
                document.getElementById(id).value = "";
            });
        }
    </script>
</body>
</html>
