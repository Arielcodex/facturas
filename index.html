<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arielcodex - IA Aprendizaje</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #1f2937; }
        .dark-mode { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: all 0.3s ease; min-height: 100vh; }
        .glass { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .loader-ia { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">ARIELCODEX<span class="text-gray-400 font-light">.sys</span></h1>
            <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700">🌙</button>
        </div>
        
        <div class="glass rounded-3xl p-5 shadow-xl mb-6 flex items-center gap-4 border-l-4 border-blue-500">
            <div id="bot-status" class="text-3xl">🤖</div>
            <div>
                <p id="saludo-asistente" class="text-xs font-bold text-blue-500 uppercase">Asistente con Memoria</p>
                <p id="mensaje-asistente" class="text-sm font-medium opacity-80">Estoy aprendiendo de tus facturas anteriores...</p>
            </div>
        </div>

        <div class="glass rounded-3xl p-6 shadow-xl space-y-4 mb-8">
            <div id="reader" class="rounded-2xl overflow-hidden bg-black mb-2 hidden"></div>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="startScanner()" class="py-3 rounded-2xl bg-blue-600 text-white font-bold text-[10px] uppercase">📸 Escanear QR</button>
                <label class="py-3 rounded-2xl bg-indigo-600 text-white font-bold text-[10px] uppercase text-center cursor-pointer">
                    📄 Leer con IA
                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="procesarIA(event)">
                </label>
            </div>

            <div class="space-y-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                <div>
                    <label class="text-[10px] font-bold ml-2 text-gray-400 uppercase">N° Comprobante</label>
                    <input type="text" id="nroFactura" oninput="validarForm()" class="w-full p-4 rounded-xl bg-gray-100 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold ml-2 text-gray-400 uppercase">Proveedor (Sugerido por IA)</label>
                    <input type="text" id="proveedor" oninput="validarForm()" class="w-full p-4 rounded-xl bg-gray-100 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <input type="text" id="descripcion" placeholder="Notas adicionales..." class="w-full p-4 rounded-xl bg-gray-100 dark:bg-gray-800 outline-none">
            </div>
            
            <button onclick="enviarDatos()" id="btnEnviar" class="w-full py-4 rounded-2xl bg-gray-400 text-white font-black shadow-lg transition-all" disabled>REVISAR DATOS</button>
        </div>

        <div id="listaFacturas" class="space-y-3"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-nua5x1TEV3bPT9X6F6lOauMFHxU7BaGneWPyy-LMvp42CzVfBiicQ1OWyzqkfV2TPg/exec";
        let historialFacturas = [];
        let proveedoresHistoricos = [];

        window.onload = async () => {
            const hora = new Date().getHours();
            document.getElementById('saludo-asistente').innerText = hora < 12 ? "¡Buen día, Esteban!" : "¡Buenas tardes, Esteban!";
            await cargarHistorial();
        };

        async function cargarHistorial() {
            try {
                const res = await fetch(API_URL);
                historialFacturas = await res.json();
                // Extraer nombres únicos de proveedores cargados antes
                proveedoresHistoricos = [...new Set(historialFacturas.map(f => f.proveedor.toUpperCase()))];
                renderizarLista(historialFacturas);
                document.getElementById('mensaje-asistente').innerText = `He aprendido de ${proveedoresHistoricos.length} proveedores anteriores.`;
            } catch (e) { console.log("Error de carga."); }
        }

        async function procesarIA(event) {
            const file = event.target.files[0];
            if (!file) return;

            const msg = document.getElementById('mensaje-asistente');
            const status = document.getElementById('bot-status');
            msg.innerText = "Analizando texto y comparando con historial...";
            status.innerText = "🧠";

            Tesseract.recognize(file, 'spa').then(({ data: { text } }) => {
                const rawText = text.toUpperCase();
                console.log("IA leyó:", rawText);
                
                // 1. Intentar buscar N° de factura
                const regexNro = /(\d{4,5}[- ]\d{8})|(\d{12,13})/;
                const matchNro = rawText.match(regexNro);
                if (matchNro) document.getElementById('nroFactura').value = matchNro[0];

                // 2. BUSCAR POR APRENDIZAJE: Comparar con proveedores que ya usaste
                let detectado = "";
                proveedoresHistoricos.forEach(p => {
                    if (rawText.includes(p) && p.length > 3) detectado = p;
                });

                // 3. BUSCAR POR PALABRAS CLAVE (Droguerías, etc)
                const claves = ["DROGUERIA", "DROGUERÍAS", "FARMACIA", "LABORATORIO", "DISTRIBUIDORA"];
                claves.forEach(c => {
                    if (rawText.includes(c) && !detectado) {
                        // Si encuentra la palabra clave, intenta extraer la palabra siguiente como nombre
                        const palabras = rawText.split(/\s+/);
                        const idx = palabras.indexOf(c);
                        detectado = c + " " + (palabras[idx+1] || "");
                    }
                });

                if (detectado) document.getElementById('proveedor').value = detectado;
                
                status.innerText = "✅";
                msg.innerText = detectado ? `¡Reconocí a ${detectado}!` : "No encontré coincidencias, pero podés cargarla manual.";
                validarForm();
            });
        }

        function validarForm() {
            const nro = document.getElementById('nroFactura').value.trim();
            const prov = document.getElementById('proveedor').value.trim();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = !(nro && prov);
            btn.classList.toggle('bg-green-500', !btn.disabled);
            btn.classList.toggle('bg-gray-400', btn.disabled);
            if(!btn.disabled) btn.innerText = "GUARDAR REGISTRO";
        }

        function renderizarLista(datos) {
            document.getElementById('listaFacturas').innerHTML = datos.slice(0,5).map(f => `
                <div class="glass p-4 rounded-2xl border-l-4 border-blue-500 mb-2">
                    <p class="font-bold text-sm text-blue-500">${f.proveedor}</p>
                    <p class="text-xs opacity-60">N°: ${f.nroFactura}</p>
                </div>
            `).join('');
        }

        async function enviarDatos() {
            const btn = document.getElementById('btnEnviar');
            btn.innerText = "REGISTRANDO...";
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({
                nroFactura: document.getElementById('nroFactura').value,
                proveedor: document.getElementById('proveedor').value,
                descripcion: document.getElementById('descripcion').value,
                precio: "0"
            })});
            location.reload();
        }

        function startScanner() {
            const reader = document.getElementById('reader');
            reader.classList.remove('hidden');
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('nroFactura').value = text;
                scanner.stop();
                reader.classList.add('hidden');
                validarForm();
            });
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    </script>
</body>
</html>
