<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL INTERNO - Auditoría IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .modal-history { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
        .active-modal { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .alert-ia { border: 2px solid #f59e0b; background: rgba(245, 158, 11, 0.1); animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="login-screen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center border-t-4 border-blue-500">
            <h1 class="text-blue-500 font-black text-2xl tracking-tighter mb-1 uppercase">CONTROL INTERNO</h1>
            <p class="text-[9px] text-gray-500 uppercase font-bold mb-6 tracking-widest">Auditoría & Predicción</p>
            <div class="space-y-3">
                <input type="text" id="userInput" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 border-none text-center uppercase font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="passInput" placeholder="CLAVE" class="w-full p-4 rounded-xl bg-slate-800 border-none text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black shadow-lg">INGRESAR</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto hidden">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 class="text-xl font-black text-blue-500 leading-tight italic">CONTROL INTERNO</h2>
                <p id="userDisplay" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
            </div>
            <div class="text-right glass p-2 rounded-xl border-l-4 border-green-500">
                <p class="text-[8px] font-bold text-gray-400 uppercase">Hoy</p>
                <p id="statsToday" class="text-lg font-black text-green-400">0</p>
            </div>
        </div>

        <div id="ia-box" class="hidden glass rounded-2xl p-4 mb-4">
            <div class="flex items-center gap-3">
                <span id="ia-icon" class="text-2xl">🤖</span>
                <div class="flex-1">
                    <p id="ia-title" class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Sugerencia del Sistema</p>
                    <p id="ia-msg" class="text-[11px] font-bold text-white leading-tight mt-1"></p>
                </div>
            </div>
            <div id="ia-actions" class="hidden flex gap-2 mt-3">
                <button onclick="aplicarSugerencia()" class="flex-1 py-2 bg-blue-600 rounded-lg text-[9px] font-black uppercase">Completar Datos</button>
                <button onclick="ocultarSugerencia()" class="px-4 py-2 bg-slate-700 rounded-lg text-[9px] font-black uppercase">Ignorar</button>
            </div>
        </div>

        <div id="form-container" class="glass rounded-3xl p-6 shadow-2xl mb-6 space-y-4 border-b-4 border-blue-500 transition-all duration-300">
            <div id="reader" class="rounded-2xl overflow-hidden hidden mb-4 bg-black"></div>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="startScan()" class="py-3 bg-blue-600 rounded-xl font-bold text-[10px] uppercase">📸 Escanear QR</button>
                <label class="py-3 bg-indigo-600 rounded-xl font-bold text-[10px] uppercase text-center cursor-pointer">
                    🔍 Leer Factura IA
                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="procesarFacturaIA(event)">
                </label>
            </div>

            <div class="flex gap-2">
                <input type="text" id="nroFactura" oninput="analizarPatron()" placeholder="N° Comprobante" class="flex-[2] p-4 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500">
                <select id="tipoDoc" class="flex-1 bg-slate-800 rounded-xl text-[10px] font-bold uppercase outline-none">
                    <option value="FACTURA">Factura</option>
                    <option value="REMITO">Remito</option>
                </select>
            </div>

            <input type="text" id="proveedor" placeholder="Droguería / Proveedor" class="w-full p-4 rounded-xl bg-slate-800 outline-none">
            
            <div class="relative">
                <span class="absolute left-4 top-4 text-green-500 font-bold">$</span>
                <input type="number" id="importe" oninput="auditarPrecio()" placeholder="Importe Total" class="w-full p-4 pl-8 rounded-xl bg-slate-800 border-2 border-slate-700 outline-none font-bold text-green-400 text-xl">
            </div>

            <button id="btnSave" onclick="saveData()" class="w-full py-5 bg-blue-600 rounded-2xl font-black shadow-lg uppercase tracking-widest text-sm transition-all">GUARDAR REGISTRO</button>
        </div>

        <button onclick="toggleHistory(true)" class="w-full py-4 glass border border-slate-700 rounded-2xl flex items-center justify-center gap-3">
            <span class="text-xl">📊</span>
            <span class="font-black text-xs uppercase tracking-widest">Historial de Auditoría</span>
        </button>
    </div>

    <div id="history-modal" class="modal-history p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-blue-500 uppercase">HISTORIAL</h3>
                <button onclick="toggleHistory(false)" class="p-3 bg-slate-800 rounded-full text-xl leading-none">✕</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw-nua5x1TEV3bPT9X6F6lOauMFHxU7BaGneWPyy-LMvp42CzVfBiicQ1OWyzqkfV2TPg/exec";
        let history = [];
        let user = "";
        let sugerenciaActiva = null;

        function login() {
            const userIn = document.getElementById('userInput').value.trim().toUpperCase();
            const passIn = document.getElementById('passInput').value.trim();
            if ((userIn === "ESTEBAN" || userIn === "OMAR") && passIn === "5678") {
                user = userIn;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `OPERADOR: ${user}`;
                loadHistory();
            }
        }

        // --- MOTOR DE AUDITORÍA Y PREDICCIÓN ---
        function analizarPatron() {
            const nro = document.getElementById('nroFactura').value;
            if (nro.length < 3) return ocultarSugerencia();

            const patron = nro.substring(0, 4);
            const coincidencia = history.find(f => f.nroFactura.toString().startsWith(patron));

            if (coincidencia) {
                sugerenciaActiva = coincidencia;
                mostrarIA(`Detectado patrón de <b>${coincidencia.proveedor}</b>. ¿Es correcto?`, true);
            } else {
                analizarFechas();
            }
        }

        function analizarFechas() {
            const hoy = new Date().getDate();
            const proveedoresMes = history.filter(f => {
                const fechaF = new Date(f.descripcion.split('|')[3] || ""); // Suponiendo fecha en descripción
                return fechaF.getDate() >= hoy && fechaF.getDate() <= hoy + 2;
            });

            if (proveedoresMes.length > 0) {
                mostrarIA(`Recordatorio: Estamos en fecha habitual de <b>${proveedoresMes[0].proveedor}</b>.`, false);
            }
        }

        function auditarPrecio() {
            const provActual = document.getElementById('proveedor').value;
            const importeActual = parseFloat(document.getElementById('importe').value);
            if (!provActual || !importeActual) return;

            const historicoProv = history.filter(f => f.proveedor === provActual);
            if (historicoProv.length < 2) return;

            const suma = historicoProv.reduce((acc, f) => acc + parseFloat(f.precio), 0);
            const promedio = suma / historicoProv.length;

            if (importeActual > promedio * 1.3) {
                document.getElementById('form-container').classList.add('alert-ia');
                mostrarIA(`⚠️ <b>ALERTA DE PRECIO:</b> Este importe es un 30% superior al promedio de este proveedor.`, false);
            } else {
                document.getElementById('form-container').classList.remove('alert-ia');
            }
        }

        async function procesarFacturaIA(event) {
            const file = event.target.files[0];
            mostrarIA("Analizando documento completo...", false);
            
            try {
                const worker = await Tesseract.createWorker('spa');
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                // Búsqueda de Importe
                const matchMonto = text.match(/TOTAL[:\s]*\$?\s*([\d\.,]+)/i);
                if (matchMonto) {
                    document.getElementById('importe').value = parseFloat(matchMonto[1].replace(/\./g, '').replace(',', '.'));
                }

                // Clasificación automática
                if (text.toUpperCase().includes("BONIFICADO") || text.toUpperCase().includes("NC")) {
                    mostrarIA("⭐ Detectada <b>Bonificación o Nota de Crédito</b> en el papel.", false);
                } else if (text.toUpperCase().includes("VENCE") || text.toUpperCase().includes("VTO")) {
                    mostrarIA("📅 Detectada <b>Fecha de Vencimiento</b> importante.", false);
                } else {
                    mostrarIA("Lectura finalizada.", false);
                }
                auditarPrecio();
            } catch (e) { mostrarIA("Error en OCR.", false); }
        }

        // --- UTILIDADES UI ---
        function mostrarIA(msg, conAcciones) {
            const box = document.getElementById('ia-box');
            document.getElementById('ia-msg').innerHTML = msg;
            document.getElementById('ia-actions').style.display = conAcciones ? 'flex' : 'none';
            box.classList.remove('hidden');
        }

        function aplicarSugerencia() {
            if (sugerenciaActiva) {
                document.getElementById('proveedor').value = sugerenciaActiva.proveedor;
                ocultarSugerencia();
                auditarPrecio();
            }
        }

        function ocultarSugerencia() {
            document.getElementById('ia-box').classList.add('hidden');
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const data = {
                nroFactura: document.getElementById('nroFactura').value,
                proveedor: document.getElementById('proveedor').value,
                precio: document.getElementById('importe').value,
                descripcion: `${document.getElementById('tipoDoc').value} | $${document.getElementById('importe').value} | Operador: ${user} | ${new Date().toLocaleDateString()}`,
                firma: "N/A"
            };
            if(!data.nroFactura || !data.proveedor || !data.precio) return alert("Faltan datos");
            
            btn.innerText = "PROCESANDO AUDITORÍA..."; btn.disabled = true;
            try {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                clearForm(); await loadHistory();
                alert("✅ Registro guardado y auditado");
            } catch(e) { alert("Error de conexión"); }
            finally { btn.innerText = "GUARDAR REGISTRO"; btn.disabled = false; }
        }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                history = await res.json();
                document.getElementById('statsToday').innerText = history.filter(f => f.descripcion.includes(new Date().toLocaleDateString())).length;
                filterData();
                analizarFechas();
            } catch(e) {}
        }

        function filterData() {
            document.getElementById('historyList').innerHTML = history.slice(-15).reverse().map(f => `
                <div class="glass p-4 rounded-2xl border-l-4 ${f.descripcion.includes('FACTURA') ? 'border-blue-500' : 'border-green-500'}">
                    <div class="flex justify-between">
                        <p class="font-black text-blue-400 text-sm uppercase">${f.proveedor}</p>
                        <p class="text-[12px] text-green-400 font-bold">$${f.precio || '0'}</p>
                    </div>
                    <p class="text-[10px] font-bold mt-1 opacity-60 uppercase">N° ${f.nroFactura} - ${f.descripcion.split('|')[3] || ''}</p>
                </div>
            `).join('');
        }

        function toggleHistory(show) {
            document.getElementById('history-modal').classList.toggle('active-modal', show);
        }

        function clearForm() {
            document.getElementById('nroFactura').value = "";
            document.getElementById('proveedor').value = "";
            document.getElementById('importe').value = "";
            document.getElementById('form-container').classList.remove('alert-ia');
            ocultarSugerencia();
        }

        function startScan() {
            const reader = document.getElementById('reader');
            reader.classList.remove('hidden');
            const sc = new Html5Qrcode("reader");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('nroFactura').value = txt;
                sc.stop(); reader.classList.add('hidden');
                analizarPatron();
            });
        }
    </script>
</body>
</html>
