<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL INTERNO - Auditoría Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .modal-view { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
        .active-view { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .field-error { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .success-msg { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-screen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center border-t-4 border-blue-500">
            <h1 class="text-blue-500 font-black text-2xl mb-1 uppercase">CONTROL INTERNO</h1>
            <input type="text" id="userInput" onkeydown="handleEnter(event, 'btnLogin')" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 mb-4 text-center uppercase font-bold outline-none border border-transparent focus:border-blue-500">
            <button id="btnLogin" onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black shadow-lg hover:bg-blue-500 transition-all">INGRESAR</button>
        </div>
    </div>

    <div id="app" class="max-w-7xl mx-auto hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-4">
                <header class="mb-4">
                    <h2 class="text-2xl font-black text-blue-500 italic uppercase">Carga de Comprobantes</h2>
                    <p id="userDisplay" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
                </header>

                <div class="glass rounded-3xl p-6 border-b-4 border-blue-500 space-y-4" id="formContainer">
                    <div class="flex gap-2">
                        <select id="tipoDoc" class="flex-1 bg-slate-800 rounded-xl text-[10px] font-bold uppercase outline-none px-2 border border-slate-700">
                            <option value="FACTURA">Factura</option>
                            <option value="REMITO">Remito</option>
                        </select>
                        <input type="text" id="nroFactura" onkeydown="handleEnter(event, 'proveedor')" placeholder="N° Comprobante *" class="flex-[2] p-4 rounded-xl bg-slate-800 outline-none border border-slate-700 focus:border-blue-500">
                    </div>

                    <input type="text" id="proveedor" 
                           oninput="this.value = this.value.toUpperCase(); updateUILists();" 
                           onkeydown="handleEnter(event, 'importe')" 
                           placeholder="PROVEEDOR *" 
                           class="w-full p-4 rounded-xl bg-slate-800 outline-none uppercase font-bold text-blue-400 border border-slate-700 focus:border-blue-500">
                    
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-green-500 font-bold">$</span>
                        <input type="number" id="importe" onkeydown="handleEnter(event, 'observaciones')" placeholder="TOTAL *" class="w-full p-4 pl-8 rounded-xl bg-slate-800 font-bold text-green-400 text-2xl outline-none border border-slate-700 focus:border-green-500">
                    </div>

                    <input type="text" id="observaciones" onkeydown="handleEnter(event, 'btnSave')" placeholder="DESCRIPCIÓN / NOTAS (OPCIONAL)" class="w-full p-4 rounded-xl bg-slate-800 outline-none border border-slate-700 focus:border-blue-500 text-sm">

                    <button id="btnSave" onclick="saveData()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase shadow-xl hover:bg-blue-500 transition-all">GUARDAR REGISTRO</button>
                    
                    <p id="valAlert" class="hidden text-center text-red-500 text-[10px] font-bold uppercase">⚠️ Completa los campos con *</p>
                    <div id="successAlert" class="hidden success-msg p-4 bg-green-500/20 border border-green-500 rounded-xl text-green-400 text-center font-bold text-sm uppercase">
                        ✅ Cargado correctamente
                    </div>
                </div>

                <button onclick="toggleView('history')" class="w-full py-4 glass border border-slate-700 rounded-2xl font-black text-xs uppercase tracking-widest">Ver Historial Completo</button>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">Monitor en tiempo real</h3>
                <div id="liveList" class="space-y-3"></div>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">Distribución Mensual</h3>
                <div class="glass p-6 rounded-3xl border-t-2 border-blue-500">
                    <canvas id="chartPie" class="max-h-[300px]"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="view-history" class="modal-view p-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-blue-500 uppercase">Historial de Auditoría</h3>
                <button onclick="toggleView('app')" class="p-4 bg-slate-800 rounded-full">✕</button>
            </div>
            <div id="fullHistoryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <script>
        const API = "Thttps://script.google.com/macros/s/AKfycbzQQvAVXC4BGl1bx2CfHsr7mxCYGjyhCqTjNNvaICfNRxDtiXDfcwqAoYqNTkF-wPo6aQ/exec"; // REEMPLAZAR CON TU URL DE APPS SCRIPT
        
        let historyData = [];
        let currentUser = "";

        function handleEnter(event, nextId) {
            if (event.key === "Enter") {
                event.preventDefault();
                const el = document.getElementById(nextId);
                if (el) el.focus();
                if (el && el.tagName === "BUTTON") el.click();
            }
        }

        function login() {
            const userIn = document.getElementById('userInput').value.trim().toUpperCase();
            if (userIn) {
                currentUser = userIn;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `Operador: ${currentUser}`;
                loadHistory();
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                const rawData = await res.json();
                historyData = rawData.map(f => ({
                    proveedor: f.proveedor || f.Proveedor || "S/D",
                    precio: f.precio || f.Precio || 0,
                    nroFactura: f.nroFactura || f["nroFactura"] || "0",
                    fecha: f.fecha || f.Fecha || "",
                    estado: f.estado || f.Estado || "CARGADO",
                    descripcion: f.descripcion || f.Descripción || ""
                }));
                updateUILists();
                renderCharts();
            } catch(e) { console.error("Error al cargar datos"); }
        }

        function updateUILists() {
            const query = document.getElementById('proveedor').value.toLowerCase();
            const filtered = historyData.filter(f => f.proveedor.toLowerCase().includes(query)).reverse();
            
            const renderCard = (f) => `
                <div class="glass p-4 rounded-2xl border-l-4 border-blue-500 animate-fadeIn">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-blue-400 text-sm uppercase">${f.proveedor}</p>
                        <p class="text-[14px] text-green-400 font-bold">$${f.precio}</p>
                    </div>
                    <p class="text-[9px] font-bold opacity-50 mt-1 uppercase">N° ${f.nroFactura} | ${f.fecha}</p>
                    ${f.descripcion ? `<p class="text-[9px] italic opacity-40 mt-1">${f.descripcion}</p>` : ''}
                </div>`;

            document.getElementById('liveList').innerHTML = filtered.slice(0, 10).map(renderCard).join('') || "<p class='text-center opacity-30 text-xs py-10'>Sin registros</p>";
            document.getElementById('fullHistoryList').innerHTML = filtered.map(renderCard).join('');
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const nro = document.getElementById('nroFactura');
            const prov = document.getElementById('proveedor');
            const imp = document.getElementById('importe');
            const obs = document.getElementById('observaciones');
            const success = document.getElementById('successAlert');
            const alertMsg = document.getElementById('valAlert');

            // VALIDACIÓN: NINGÚN CAMPO VACÍO (Excepto descripción que es opcional, o podés incluirla)
            if (!nro.value || !prov.value || !imp.value) {
                alertMsg.classList.remove('hidden');
                if(!nro.value) nro.classList.add('field-error');
                if(!prov.value) prov.classList.add('field-error');
                if(!imp.value) imp.classList.add('field-error');
                return;
            }

            // Limpiar estados de error
            [nro, prov, imp].forEach(el => el.classList.remove('field-error'));
            alertMsg.classList.add('hidden');

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const payload = {
                fechaLocal: new Date().toLocaleString('es-AR'),
                nroFactura: nro.value,
                proveedor: prov.value.toUpperCase(),
                precio: imp.value,
                descripcion: `${document.getElementById('tipoDoc').value}: ${obs.value} | RESP: ${currentUser}`,
                estado: "CARGADO"
            };

            try {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                
                // MOSTRAR MENSAJE DE ÉXITO
                success.classList.remove('hidden');
                setTimeout(() => success.classList.add('hidden'), 3000);

                // Limpiar campos
                nro.value = "";
                prov.value = "";
                imp.value = "";
                obs.value = "";
                nro.focus();
                
                setTimeout(loadHistory, 1500);
            } catch(e) { 
                alert("Error de conexión"); 
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR REGISTRO";
            }
        }

        function toggleView(view) {
            document.getElementById('view-history').classList.toggle('active-view', view === 'history');
        }

        let myChart;
        function renderCharts() {
            const ctx = document.getElementById('chartPie').getContext('2d');
            if (myChart) myChart.destroy();
            const counts = {};
            historyData.forEach(f => counts[f.proveedor] = (counts[f.proveedor] || 0) + 1);
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#6366f1', '#ec4899'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: 'white', font: { size: 9 } } } } }
            });
        }
    </script>
</body>
</html>
