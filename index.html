<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL INTERNO - Creado por Esteban</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #signature-pad { border: 2px dashed #3b82f6; background: white; cursor: crosshair; touch-action: none; }
        .modal-history { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
        .active-modal { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .loading-ia { animation: pulse 1s infinite; color: #3b82f6; font-weight: 800; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="login-screen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center border-t-4 border-blue-500">
            <h1 class="text-blue-500 font-black text-2xl tracking-tighter mb-1 uppercase">CONTROL INTERNO</h1>
            <p class="text-[9px] text-gray-500 uppercase font-bold mb-6 tracking-widest">Creado por Esteban</p>
            <div class="space-y-3">
                <input type="text" id="userInput" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 border-none text-center uppercase font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="passInput" placeholder="CLAVE" class="w-full p-4 rounded-xl bg-slate-800 border-none text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black shadow-lg">INGRESAR</button>
            </div>
            <p id="errorLogin" class="hidden text-red-500 text-[10px] mt-4 font-bold uppercase italic">Acceso Denegado</p>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto hidden">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 class="text-xl font-black text-blue-500 leading-tight">CONTROL INTERNO</h2>
                <p class="text-[8px] font-bold opacity-40 uppercase tracking-widest mb-1">Creado por Esteban</p>
                <p id="userDisplay" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
            </div>
            <div class="text-right glass p-2 rounded-xl border-l-4 border-green-500">
                <p class="text-[8px] font-bold text-gray-400 uppercase tracking-tighter">Carga Hoy</p>
                <p id="statsToday" class="text-lg font-black text-green-400">0</p>
            </div>
        </div>

        <button onclick="toggleHistory(true)" class="w-full mb-6 py-4 bg-slate-800 border border-slate-700 rounded-2xl flex items-center justify-center gap-3 shadow-xl">
            <span class="text-xl">📊</span>
            <span class="font-black text-xs uppercase tracking-widest">Ver Registros Cargados</span>
        </button>

        <div class="glass rounded-3xl p-6 shadow-2xl mb-6 space-y-4 border-b-4 border-blue-500">
            <div id="reader" class="rounded-2xl overflow-hidden hidden mb-4 bg-black"></div>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="startScan()" class="py-3 bg-blue-600 rounded-xl font-bold text-[10px] uppercase">📸 Escanear QR</button>
                <label class="py-3 bg-indigo-600 rounded-xl font-bold text-[10px] uppercase text-center cursor-pointer">
                    🔍 Leer Importe
                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="leerImporteIA(event)">
                </label>
            </div>

            <p id="ia-status" class="hidden text-[10px] text-center uppercase font-bold"></p>

            <div class="flex gap-2">
                <input type="text" id="nroFactura" oninput="checkDuplicate()" placeholder="N° Comprobante" class="flex-[2] p-4 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500">
                <select id="tipoDoc" class="flex-1 bg-slate-800 rounded-xl text-[10px] font-bold uppercase outline-none">
                    <option value="FACTURA">Factura</option>
                    <option value="REMITO">Remito</option>
                    <option value="NC">N. Cred.</option>
                </select>
            </div>
            
            <p id="dupAlert" class="hidden text-[9px] text-red-500 font-bold uppercase">⚠️ Ya cargado previamente</p>

            <input type="text" id="proveedor" placeholder="Droguería / Proveedor" class="w-full p-4 rounded-xl bg-slate-800 outline-none">
            
            <div class="relative">
                <span class="absolute left-4 top-4 text-green-500 font-bold">$</span>
                <input type="number" id="importe" placeholder="Importe Total" class="w-full p-4 pl-8 rounded-xl bg-slate-800 border-2 border-slate-700 outline-none focus:border-green-500 font-bold text-green-400">
            </div>

            <div class="space-y-2">
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Firma digital:</p>
                <canvas id="signature-pad" class="w-full h-24 rounded-xl"></canvas>
            </div>

            <button id="btnSave" onclick="saveData()" class="w-full py-4 bg-blue-600 rounded-2xl font-black shadow-lg">GUARDAR EN SISTEMA</button>
        </div>
    </div>

    <div id="history-modal" class="modal-history p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-blue-500 italic uppercase">HISTORIAL DE CARGA</h3>
                <button onclick="toggleHistory(false)" class="p-3 bg-slate-800 rounded-full text-xl leading-none">✕</button>
            </div>

            <div class="space-y-3 mb-6">
                <input type="text" id="search" oninput="filterData()" placeholder="🔍 Buscar..." class="w-full p-4 rounded-2xl bg-slate-800 outline-none border border-slate-700">
                <div class="grid grid-cols-2 gap-2">
                    <select id="filterType" onchange="filterData()" class="bg-slate-800 p-3 rounded-xl text-[10px] font-bold uppercase outline-none">
                        <option value="">Tipos</option>
                        <option value="FACTURA">Facturas</option>
                        <option value="REMITO">Remitos</option>
                    </select>
                    <select id="filterUser" onchange="filterData()" class="bg-slate-800 p-3 rounded-xl text-[10px] font-bold uppercase outline-none">
                        <option value="">Operador</option>
                        <option value="ESTEBAN">Esteban</option>
                        <option value="OMAR">Omar</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-2 mb-6">
                <button onclick="generateReport('whatsapp')" class="flex-1 py-3 bg-green-600 rounded-xl text-[10px] font-black uppercase">WhatsApp PDF</button>
                <button onclick="generateReport('email')" class="flex-1 py-3 bg-indigo-600 rounded-xl text-[10px] font-black uppercase">Email PDF</button>
            </div>

            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw-nua5x1TEV3bPT9X6F6lOauMFHxU7BaGneWPyy-LMvp42CzVfBiicQ1OWyzqkfV2TPg/exec";
        let history = [];
        let user = "";
        let coords = { lat: 0, lon: 0 };

        function login() {
            const userIn = document.getElementById('userInput').value.trim().toUpperCase();
            const passIn = document.getElementById('passInput').value.trim();
            if ((userIn === "ESTEBAN" || userIn === "OMAR") && passIn === "5678") {
                user = userIn;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `OPERADOR: ${user}`;
                initGeo(); initSignature(); loadHistory();
            } else {
                document.getElementById('errorLogin').classList.remove('hidden');
            }
        }

        async function leerImporteIA(event) {
            const file = event.target.files[0];
            if (!file) return;
            const status = document.getElementById('ia-status');
            status.classList.remove('hidden');
            status.className = "loading-ia text-[10px] text-center mb-2";
            status.innerText = "🤖 Esteban-IA analizando importe...";
            try {
                const worker = await Tesseract.createWorker('spa');
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();
                const regex = /TOTAL[:\s]*\$?\s*([\d\.,]+)/i;
                const match = text.match(regex);
                if (match) {
                    let valor = match[1].replace(/\./g, '').replace(',', '.');
                    document.getElementById('importe').value = parseFloat(valor);
                    status.innerText = "✅ Importe detectado";
                    status.className = "text-green-500 text-[10px] font-bold text-center mb-2 uppercase";
                } else {
                    status.innerText = "❌ No detectado. Ingrese manual.";
                    status.className = "text-orange-500 text-[10px] font-bold text-center mb-2 uppercase";
                }
            } catch (e) { status.innerText = "⚠️ Error OCR"; }
        }

        function toggleHistory(show) {
            const modal = document.getElementById('history-modal');
            if(show) modal.classList.add('active-modal');
            else modal.classList.remove('active-modal');
        }

        function initGeo() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    coords.lat = p.coords.latitude; coords.lon = p.coords.longitude;
                });
            }
        }

        let canvas, ctx, drawing = false;
        function initSignature() {
            canvas = document.getElementById('signature-pad');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const start = (e) => { drawing = true; ctx.beginPath(); draw(e); };
            const end = () => { drawing = false; };
            const move = (e) => { if(drawing) draw(e); };
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', (e) => { start(e.touches[0]); e.preventDefault(); });
            canvas.addEventListener('touchmove', (e) => { move(e.touches[0]); e.preventDefault(); });
            canvas.addEventListener('touchend', end);
        }

        function draw(e) {
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function clearSignature() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                history = await res.json();
                updateStats(); filterData();
            } catch(e) { console.log("Offline"); }
        }

        function checkDuplicate() {
            const nro = document.getElementById('nroFactura').value;
            const exists = history.some(f => f.nroFactura.toString() === nro.toString());
            document.getElementById('nroFactura').classList.toggle('ring-red-500', exists);
            document.getElementById('dupAlert').classList.toggle('hidden', !exists);
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const data = {
                nroFactura: document.getElementById('nroFactura').value,
                proveedor: document.getElementById('proveedor').value,
                descripcion: `${document.getElementById('tipoDoc').value} | $${document.getElementById('importe').value} | Resp: ${user} | GPS: ${coords.lat},${coords.lon}`,
                precio: document.getElementById('importe').value, 
                firma: canvas.toDataURL()
            };
            if(!data.nroFactura || !data.proveedor || !data.precio) return alert("Faltan datos");
            btn.innerText = "GUARDANDO..."; btn.disabled = true;
            try {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                clearForm(); await loadHistory();
                alert("✅ Registro guardado en Control Interno");
            } catch(e) { alert("Error al conectar"); }
            finally { btn.innerText = "GUARDAR EN SISTEMA"; btn.disabled = false; }
        }

        function filterData() {
            const searchVal = document.getElementById('search').value.toLowerCase();
            const typeVal = document.getElementById('filterType').value;
            const userVal = document.getElementById('filterUser').value;
            const list = history.filter(f => {
                const matchSearch = JSON.stringify(f).toLowerCase().includes(searchVal);
                const matchType = typeVal === "" || f.descripcion.includes(typeVal);
                const matchUser = userVal === "" || f.descripcion.includes(userVal);
                return matchSearch && matchType && matchUser;
            }).reverse();
            document.getElementById('historyList').innerHTML = list.map(f => `
                <div class="glass p-4 rounded-2xl border-l-4 ${f.descripcion.includes('FACTURA') ? 'border-blue-500' : 'border-green-500'}">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-blue-400 text-sm uppercase">${f.proveedor}</p>
                        <p class="text-[10px] text-green-400 font-bold">$${f.precio || '0'}</p>
                    </div>
                    <p class="text-xs font-bold mt-1">N° ${f.nroFactura}</p>
                </div>
            `).join('');
        }

        async function generateReport(method) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const source = history.filter(f => JSON.stringify(f).toLowerCase().includes(document.getElementById('search').value.toLowerCase()));
            if(source.length === 0) return alert("Sin datos");
            doc.setFontSize(18); doc.setTextColor(59, 130, 246); doc.text("REPORTE CONTROL INTERNO", 14, 20);
            doc.setFontSize(10); doc.setTextColor(100); doc.text("Sistema creado por Esteban", 14, 26);
            doc.autoTable({
                startY: 35,
                head: [['Comprobante', 'Droguería', 'Importe', 'Detalles']],
                body: source.map(f => [f.nroFactura, f.proveedor, `$${f.precio}`, f.descripcion.split('|').slice(2).join('|')]),
            });
            const blob = doc.output('blob');
            const file = new File([blob], `Reporte_Control_Interno.pdf`, { type: "application/pdf" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Control Interno Reporte' });
            } else { doc.save(`Reporte_Control_Interno.pdf`); }
        }

        function updateStats() {
            const hoy = new Date().toLocaleDateString();
            const count = history.filter(f => f.descripcion.includes(hoy)).length;
            document.getElementById('statsToday').innerText = count;
        }

        function clearForm() {
            document.getElementById('nroFactura').value = "";
            document.getElementById('proveedor').value = "";
            document.getElementById('importe').value = "";
            document.getElementById('ia-status').classList.add('hidden');
            clearSignature();
        }

        function startScan() {
            const reader = document.getElementById('reader');
            reader.classList.remove('hidden');
            const sc = new Html5Qrcode("reader");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('nroFactura').value = txt;
                sc.stop(); reader.classList.add('hidden');
                checkDuplicate();
            });
        }
    </script>
</body>
</html>
