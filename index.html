<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL INTERNO - Panel Integral</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .modal-view { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
        .active-view { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .field-error { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        /* Scrollbar estética */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-screen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center border-t-4 border-blue-500">
            <h1 class="text-blue-500 font-black text-2xl mb-1 uppercase tracking-tighter">CONTROL INTERNO</h1>
            <p class="text-[9px] text-gray-500 uppercase font-bold mb-6">Analista: Esteban</p>
            <input type="text" id="userInput" onkeydown="handleEnter(event, 'passInput')" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 mb-2 text-center uppercase font-bold outline-none">
            <input type="password" id="passInput" onkeydown="handleEnter(event, 'btnLogin')" placeholder="CLAVE" class="w-full p-4 rounded-xl bg-slate-800 mb-4 text-center font-bold outline-none">
            <button id="btnLogin" onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black shadow-lg">INGRESAR</button>
        </div>
    </div>

    <div id="app" class="max-w-6xl mx-auto hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-4">
                <header class="mb-4">
                    <h2 class="text-2xl font-black text-blue-500 italic">CONTROL INTERNO</h2>
                    <p id="userDisplay" class="text-[10px] font-bold text-gray-400 uppercase"></p>
                </header>

                <div id="form-container" class="glass rounded-3xl p-6 border-b-4 border-blue-500 space-y-4">
                    <div id="reader" class="rounded-2xl overflow-hidden hidden bg-black mb-4"></div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="startScan()" class="py-3 bg-blue-600 rounded-xl font-bold text-[10px] uppercase">📸 QR</button>
                        <label class="py-3 bg-indigo-600 rounded-xl font-bold text-[10px] uppercase text-center cursor-pointer">
                            🔍 IA OCR
                            <input type="file" accept="image/*" capture="environment" class="hidden" onchange="procesarIA(event)">
                        </label>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="nroFactura" onkeydown="handleEnter(event, 'proveedor')" placeholder="N° Comprobante *" class="flex-[2] p-4 rounded-xl bg-slate-800 outline-none transition-all">
                        <select id="tipoDoc" class="flex-1 bg-slate-800 rounded-xl text-[10px] font-bold uppercase outline-none">
                            <option value="FACTURA">Factura</option>
                            <option value="REMITO">Remito</option>
                        </select>
                    </div>

                    <input type="text" id="proveedor" oninput="filtrarEnVivo()" onkeydown="handleEnter(event, 'importe')" placeholder="Droguería / Proveedor *" class="w-full p-4 rounded-xl bg-slate-800 outline-none transition-all">
                    
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-green-500 font-bold">$</span>
                        <input type="number" id="importe" onkeydown="handleEnter(event, 'btnSave')" placeholder="Total *" class="w-full p-4 pl-8 rounded-xl bg-slate-800 font-bold text-green-400 text-2xl outline-none">
                    </div>

                    <button id="btnSave" onclick="saveData()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase shadow-xl hover:bg-blue-500">GUARDAR</button>
                    <p id="valAlert" class="hidden text-center text-red-500 text-[10px] font-bold uppercase">⚠️ Completa los campos obligatorios</p>
                </div>

                <button onclick="toggleView('history')" class="w-full py-4 glass border border-slate-700 rounded-2xl font-black text-xs uppercase tracking-widest">Ver Historial Completo</button>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">Últimos 10 Registros / Filtro</h3>
                <div id="liveList" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                    </div>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">Análisis en Tiempo Real</h3>
                <div class="glass p-4 rounded-3xl border-t-2 border-blue-500">
                    <canvas id="chartPie" class="max-h-[250px]"></canvas>
                </div>
                <div class="glass p-4 rounded-3xl border-t-2 border-red-500">
                    <canvas id="chartBars" class="max-h-[200px]"></canvas>
                </div>
            </div>

        </div>
    </div>

    <div id="view-history" class="modal-view p-4">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-blue-500 uppercase">AUDITORÍA COMPLETA</h3>
                <button onclick="toggleView('app')" class="p-4 bg-slate-800 rounded-full">✕</button>
            </div>
            <div id="fullHistoryList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw-nua5x1TEV3bPT9X6F6lOauMFHxU7BaGneWPyy-LMvp42CzVfBiicQ1OWyzqkfV2TPg/exec";
        let history = [];
        let user = "";
        let currentOCRTags = "NORMAL";

        function handleEnter(event, nextId) {
            if (event.key === "Enter") {
                event.preventDefault();
                const el = document.getElementById(nextId);
                el.tagName === "BUTTON" ? el.click() : el.focus();
            }
        }

        function login() {
            const userIn = document.getElementById('userInput').value.trim().toUpperCase();
            if (userIn === "ESTEBAN" || userIn === "OMAR") {
                user = userIn;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `Operador: ${user}`;
                loadHistory();
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                history = await res.json();
                renderCharts();
                updateUILists();
            } catch(e) { console.error("Error de carga"); }
        }

        function updateUILists() {
            const query = document.getElementById('proveedor').value.toLowerCase();
            const filtered = history.filter(f => f.proveedor.toLowerCase().includes(query)).reverse();
            
            // Lista lateral (últimas 10)
            document.getElementById('liveList').innerHTML = filtered.slice(0, 10).map(f => cardHTML(f)).join('');
            
            // Lista completa modal
            document.getElementById('fullHistoryList').innerHTML = filtered.map(f => cardHTML(f)).join('');
        }

        function cardHTML(f) {
            const isAlert = f.descripcion.includes('ALERTA');
            return `
                <div class="glass p-4 rounded-2xl border-l-4 ${isAlert ? 'border-red-500' : 'border-blue-500'} animate-fadeIn">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-blue-400 text-sm uppercase">${f.proveedor}</p>
                        <p class="text-[14px] text-green-400 font-bold">$${f.precio}</p>
                    </div>
                    <div class="flex justify-between mt-2 opacity-60 text-[10px] font-bold">
                        <span>N° ${f.nroFactura}</span>
                        <span>${f.descripcion.split('|')[0]}</span>
                    </div>
                </div>`;
        }

        function filtrarEnVivo() {
            updateUILists();
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const nro = document.getElementById('nroFactura');
            const prov = document.getElementById('proveedor');
            const imp = document.getElementById('importe');

            if (!nro.value || !prov.value || !imp.value) {
                document.getElementById('valAlert').classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            const data = {
                nroFactura: nro.value,
                proveedor: prov.value,
                precio: imp.value,
                descripcion: `${document.getElementById('tipoDoc').value} | ${currentOCRTags} | ${user}`,
                firma: "N/A"
            };

            try {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                clearForm();
                await loadHistory();
            } catch(e) { alert("Error"); }
            finally { btn.disabled = false; btn.innerText = "GUARDAR"; }
        }

        let chartP, chartB;
        function renderCharts() {
            const tags = { 'NORMAL': 0, 'BONIFICACION': 0, 'NOTA CREDITO': 0, 'GASTO ENVIO': 0 };
            history.forEach(f => { for (let t in tags) if (f.descripcion.includes(t)) tags[t]++; });

            if (chartP) chartP.destroy();
            chartP = new Chart(document.getElementById('chartPie'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(tags),
                    datasets: [{ data: Object.values(tags), backgroundColor: ['#475569', '#3b82f6', '#10b981', '#f59e0b'] }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: 'white', font: { size: 9 } } } } }
            });
            
            // Gráfico de barras (simplificado para la vista lateral)
            if (chartB) chartB.destroy();
            chartB = new Chart(document.getElementById('chartBars'), {
                type: 'bar',
                data: {
                    labels: ['S1', 'S2', 'S3', 'S4'],
                    datasets: [{ label: 'Cargas', data: [10, 20, 15, 25], backgroundColor: '#3b82f6' }]
                },
                options: { scales: { y: { ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } } }
            });
        }

        function clearForm() {
            ['nroFactura', 'proveedor', 'importe'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('nroFactura').focus();
            filtrarEnVivo();
        }

        function toggleView(view) {
            document.getElementById('view-history').classList.toggle('active-view', view === 'history');
        }

        async function procesarIA(event) {
            // Reutiliza la lógica OCR anterior...
        }

        function startScan() {
            // Reutiliza la lógica de escaneo anterior...
        }
    </script>
</body>
</html>
