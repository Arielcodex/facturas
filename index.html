<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL INTERNO - Sistema Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .modal-view { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
        .active-view { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Estilo para que el input siempre se vea en mayúsculas mientras se escribe */
        .uppercase-input { text-transform: uppercase; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="login-screen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center border-t-4 border-blue-500">
            <h1 class="text-blue-500 font-black text-2xl mb-1 uppercase tracking-tighter">CONTROL INTERNO</h1>
            <p class="text-[9px] text-gray-500 uppercase font-bold mb-6 tracking-widest text-center">Analista: Esteban / Omar</p>
            <input type="text" id="userInput" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 mb-2 text-center uppercase font-bold outline-none">
            <button onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black shadow-lg">INGRESAR</button>
        </div>
    </div>

    <div id="app" class="max-w-7xl mx-auto hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-4">
                <header class="mb-4">
                    <h2 class="text-2xl font-black text-blue-500 italic uppercase">Control Interno</h2>
                    <p id="userDisplay" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
                </header>

                <div class="glass rounded-3xl p-6 border-b-4 border-blue-500 space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="nroFactura" placeholder="N° Comprobante *" class="flex-[2] p-4 rounded-xl bg-slate-800 outline-none">
                        <select id="tipoDoc" class="flex-1 bg-slate-800 rounded-xl text-[10px] font-bold uppercase outline-none px-2">
                            <option value="FACTURA">Factura</option>
                            <option value="REMITO">Remito</option>
                        </select>
                    </div>

                    <input type="text" id="proveedor" 
                           oninput="this.value = this.value.toUpperCase(); updateUILists();" 
                           placeholder="DROGUERÍA / PROVEEDOR *" 
                           class="w-full p-4 rounded-xl bg-slate-800 outline-none uppercase-input font-bold text-blue-400">
                    
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-green-500 font-bold">$</span>
                        <input type="number" id="importe" placeholder="TOTAL *" class="w-full p-4 pl-8 rounded-xl bg-slate-800 font-bold text-green-400 text-2xl outline-none">
                    </div>

                    <button id="btnSave" onclick="saveData()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase shadow-xl hover:bg-blue-500 transition-all">GUARDAR REGISTRO</button>
                    <p id="valAlert" class="hidden text-center text-red-500 text-[10px] font-bold uppercase">⚠️ Completa los campos obligatorios</p>
                </div>

                <button onclick="toggleView('history')" class="w-full py-4 glass border border-slate-700 rounded-2xl font-black text-xs uppercase tracking-widest">Ver Historial Completo</button>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">Monitor de Carga (Últimas 10)</h3>
                <div id="liveList" class="space-y-3">
                    </div>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">Distribución por Proveedor</h3>
                <div class="glass p-6 rounded-3xl border-t-2 border-blue-500">
                    <canvas id="chartPie" class="max-h-[300px]"></canvas>
                </div>
            </div>

        </div>
    </div>

    <div id="view-history" class="modal-view p-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-blue-500 uppercase">Historial de Auditoría Completo</h3>
                <button onclick="toggleView('app')" class="p-4 bg-slate-800 rounded-full text-white">✕</button>
            </div>
            <div id="fullHistoryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU NUEVA URL DE GOOGLE APPS SCRIPT
        const API = "https://script.google.com/macros/s/AKfycbzQQvAVXC4BGl1bx2CfHsr7mxCYGjyhCqTjNNvaICfNRxDtiXDfcwqAoYqNTkF-wPo6aQ/exec"; 
        
        let historyData = [];
        let currentUser = "";

        function login() {
            const userIn = document.getElementById('userInput').value.trim().toUpperCase();
            if (userIn) {
                currentUser = userIn;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `Analista: ${currentUser}`;
                loadHistory();
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                const rawData = await res.json();
                
                // Normalización de datos para asegurar que se lean bien los encabezados del Sheet
                historyData = rawData.map(f => ({
                    proveedor: f.proveedor || f.Proveedor || "S/D",
                    precio: f.precio || f.Precio || 0,
                    nroFactura: f.nroFactura || f["nroFactura"] || "0",
                    fecha: f.fecha || f.Fecha || "",
                    estado: f.estado || f.Estado || "CARGADO"
                }));

                updateUILists();
                renderCharts();
            } catch(e) { 
                console.error("Error al cargar historial:", e); 
            }
        }

        function updateUILists() {
            const query = document.getElementById('proveedor').value.toLowerCase();
            // Filtrar y revertir para mostrar los más nuevos primero
            const filtered = historyData.filter(f => f.proveedor.toLowerCase().includes(query)).reverse();
            
            const cardHTML = (f) => `
                <div class="glass p-4 rounded-2xl border-l-4 border-blue-500 animate-fadeIn">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-blue-400 text-sm uppercase">${f.proveedor}</p>
                        <p class="text-[14px] text-green-400 font-bold">$${f.precio}</p>
                    </div>
                    <div class="flex justify-between mt-2 opacity-60 text-[9px] font-bold uppercase tracking-tighter">
                        <span>N° ${f.nroFactura} | ${f.estado}</span>
                        <span>${f.fecha || ''}</span>
                    </div>
                </div>`;

            // Monitor de las últimas 10 en la principal
            document.getElementById('liveList').innerHTML = filtered.slice(0, 10).map(cardHTML).join('') || "<p class='text-center opacity-30 text-xs py-10'>SIN COINCIDENCIAS</p>";
            
            // Historial completo en el modal
            document.getElementById('fullHistoryList').innerHTML = filtered.map(cardHTML).join('');
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const nro = document.getElementById('nroFactura');
            const prov = document.getElementById('proveedor');
            const imp = document.getElementById('importe');

            if (!nro.value || !prov.value || !imp.value) {
                document.getElementById('valAlert').classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = "SINCRONIZANDO...";

            // Captura de FECHA Y HORA LOCAL del dispositivo
            const ahora = new Date();
            const fechaLocal = ahora.toLocaleString('es-AR', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });

            const payload = {
                fechaLocal: fechaLocal,
                nroFactura: nro.value,
                proveedor: prov.value.toUpperCase(),
                precio: imp.value,
                descripcion: `${document.getElementById('tipoDoc').value} | RESP: ${currentUser}`,
                estado: "CARGADO"
            };

            try {
                // Envío a Google Sheets
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                
                // Limpiar formulario
                nro.value = "";
                imp.value = "";
                prov.value = "";
                document.getElementById('valAlert').classList.add('hidden');
                
                // Recarga automática de la lista después de un breve delay
                setTimeout(loadHistory, 1500);
            } catch(e) { 
                alert("Error al conectar con la base de datos"); 
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR REGISTRO";
            }
        }

        function toggleView(view) {
            document.getElementById('view-history').classList.toggle('active-view', view === 'history');
        }

        let myChart;
        function renderCharts() {
            const ctx = document.getElementById('chartPie').getContext('2d');
            if (myChart) myChart.destroy();

            const counts = {};
            historyData.forEach(f => {
                counts[f.proveedor] = (counts[f.proveedor] || 0) + 1;
            });

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#6366f1', '#ec4899', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    plugins: { 
                        legend: { 
                            position: 'bottom', 
                            labels: { color: 'white', font: { size: 9 } } 
                        } 
                    } 
                }
            });
        }
    </script>
</body>
</html>
