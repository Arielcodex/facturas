<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL INTERNO - Business Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .modal-view { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
        .active-view { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="login-screen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center border-t-4 border-blue-500">
            <h1 class="text-blue-500 font-black text-2xl tracking-tighter mb-1 uppercase">CONTROL INTERNO</h1>
            <p class="text-[9px] text-gray-500 uppercase font-bold mb-6 tracking-widest">Auditoría en Tiempo Real</p>
            <input type="text" id="userInput" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 mb-2 text-center uppercase font-bold outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="passInput" placeholder="CLAVE" class="w-full p-4 rounded-xl bg-slate-800 mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black shadow-lg">ACCEDER</button>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto hidden">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-black text-blue-500 italic leading-tight">CONTROL INTERNO</h2>
                <p id="userDisplay" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
            </div>
            <button onclick="toggleView('stats')" class="p-3 glass rounded-xl text-lg shadow-lg border-blue-500/50">📊</button>
        </header>

        <div id="form-container" class="glass rounded-3xl p-6 mb-6 space-y-4 border-b-4 border-blue-500 transition-all">
            <div id="reader" class="rounded-2xl overflow-hidden hidden mb-4 bg-black"></div>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="startScan()" class="py-3 bg-blue-600 rounded-xl font-bold text-[10px] uppercase">📸 QR</button>
                <label class="py-3 bg-indigo-600 rounded-xl font-bold text-[10px] uppercase text-center cursor-pointer">
                    🔍 IA OCR
                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="procesarIA(event)">
                </label>
            </div>
            
            <p id="ia-status" class="hidden text-[10px] text-center font-bold uppercase py-2 bg-blue-900/40 rounded-lg border border-blue-500/30"></p>

            <div class="flex gap-2">
                <input type="text" id="nroFactura" placeholder="N° Comprobante" class="flex-[2] p-4 rounded-xl bg-slate-800 outline-none">
                <select id="tipoDoc" class="flex-1 bg-slate-800 rounded-xl text-[10px] font-bold uppercase outline-none">
                    <option value="FACTURA">Factura</option>
                    <option value="REMITO">Remito</option>
                </select>
            </div>

            <input type="text" id="proveedor" placeholder="Droguería / Proveedor" class="w-full p-4 rounded-xl bg-slate-800 outline-none">
            
            <div class="relative">
                <span class="absolute left-4 top-4 text-green-500 font-bold">$</span>
                <input type="number" id="importe" placeholder="Total" class="w-full p-4 pl-8 rounded-xl bg-slate-800 font-bold text-green-400 text-2xl">
            </div>

            <button id="btnSave" onclick="saveData()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase tracking-widest shadow-xl">GUARDAR EN NUBE</button>
        </div>

        <button onclick="toggleView('history')" class="w-full py-4 glass border border-slate-700 rounded-2xl flex items-center justify-center gap-3">
            <span class="text-xl">📋</span>
            <span class="font-black text-xs uppercase tracking-widest">Historial de Auditoría</span>
        </button>
    </div>

    <div id="view-stats" class="modal-view p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-blue-500 italic uppercase">Dashboard Real</h3>
                <button onclick="toggleView('app')" class="p-3 bg-slate-800 rounded-full text-xl leading-none">✕</button>
            </div>

            <div class="space-y-6">
                <div class="glass p-4 rounded-2xl border-t-2 border-blue-500">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-4">Clasificación por Contenido (OCR)</p>
                    <canvas id="chartPie"></canvas>
                </div>

                <div class="glass p-4 rounded-2xl border-t-2 border-red-500">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-4">Tráfico: Cargas vs Alertas de Precio</p>
                    <canvas id="chartBars"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="view-history" class="modal-view p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-blue-500 uppercase">REGISTROS</h3>
                <button onclick="toggleView('app')" class="p-3 bg-slate-800 rounded-full text-xl leading-none">✕</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw-nua5x1TEV3bPT9X6F6lOauMFHxU7BaGneWPyy-LMvp42CzVfBiicQ1OWyzqkfV2TPg/exec";
        let history = [];
        let user = "";
        let currentOCRTags = "NORMAL";

        function login() {
            const userIn = document.getElementById('userInput').value.trim().toUpperCase();
            if (userIn === "ESTEBAN" || userIn === "OMAR") {
                user = userIn;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `OPERADOR: ${user}`;
                loadHistory();
            }
        }

        async function procesarIA(event) {
            const file = event.target.files[0];
            const status = document.getElementById('ia-status');
            status.classList.remove('hidden');
            status.innerText = "🤖 LEYENDO FACTURA...";
            status.classList.add('loading-pulse');

            try {
                const worker = await Tesseract.createWorker('spa');
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                const matchMonto = text.match(/TOTAL[:\s]*\$?\s*([\d\.,]+)/i);
                if (matchMonto) document.getElementById('importe').value = parseFloat(matchMonto[1].replace(/\./g, '').replace(',', '.'));

                let txt = text.toUpperCase();
                if (txt.includes("BONIF") || txt.includes("DESC")) currentOCRTags = "BONIFICACION";
                else if (txt.includes("NC") || txt.includes("CREDITO")) currentOCRTags = "NOTA CREDITO";
                else if (txt.includes("FLETE") || txt.includes("ENVIO")) currentOCRTags = "GASTO ENVIO";
                else currentOCRTags = "NORMAL";

                status.innerText = `✅ DETECTADO: ${currentOCRTags}`;
                status.classList.remove('loading-pulse');
            } catch (e) { status.innerText = "⚠️ ERROR OCR"; }
        }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                history = await res.json();
                renderCharts();
                updateHistoryList();
            } catch(e) { console.error("Error cargando datos"); }
        }

        let chartP, chartB;
        function renderCharts() {
            if (!history.length) return;

            // 1. Lógica para Gráfico de Torta (Basado en la descripción que guarda el OCR)
            const tags = { 'NORMAL': 0, 'BONIFICACION': 0, 'NOTA CREDITO': 0, 'GASTO ENVIO': 0 };
            history.forEach(f => {
                for (let tag in tags) {
                    if (f.descripcion.includes(tag)) tags[tag]++;
                }
            });

            // 2. Lógica para Gráfico de Barras (Alertas de Precio Reales)
            // Agrupamos por semana (simplificado: bloques de 7 días del mes actual)
            const semanales = [0, 0, 0, 0]; 
            const alertas = [0, 0, 0, 0];
            
            const preciosPorProveedor = {};
            history.forEach(f => {
                if(!preciosPorProveedor[f.proveedor]) preciosPorProveedor[f.proveedor] = [];
                preciosPorProveedor[f.proveedor].push(parseFloat(f.precio));
            });

            history.forEach((f, idx) => {
                const precio = parseFloat(f.precio);
                const prov = f.proveedor;
                const semIndex = Math.min(3, Math.floor(idx / (history.length / 4))); // Simulación de tiempo
                
                semanales[semIndex]++;
                
                // Si el precio es 30% mayor al promedio de ese proveedor
                const avg = preciosPorProveedor[prov].reduce((a,b)=>a+b,0) / preciosPorProveedor[prov].length;
                if (precio > avg * 1.3) alertas[semIndex]++;
            });

            const ctxP = document.getElementById('chartPie').getContext('2d');
            const ctxB = document.getElementById('chartBars').getContext('2d');

            if (chartP) chartP.destroy();
            if (chartB) chartB.destroy();

            chartP = new Chart(ctxP, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(tags),
                    datasets: [{
                        data: Object.values(tags),
                        backgroundColor: ['#475569', '#3b82f6', '#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: 'white', font: { size: 10 } } } } }
            });

            chartB = new Chart(ctxB, {
                type: 'bar',
                data: {
                    labels: ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'],
                    datasets: [
                        { label: 'Cargas Ok', data: semanales, backgroundColor: '#3b82f6' },
                        { label: 'Sobreprecios', data: alertas, backgroundColor: '#ef4444' }
                    ]
                },
                options: { 
                    scales: { x: { stacked: true, ticks: {color: '#94a3b8'} }, y: { stacked: true, ticks: {color: '#94a3b8'} } },
                    plugins: { legend: { labels: { color: 'white' } } }
                }
            });
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const data = {
                nroFactura: document.getElementById('nroFactura').value,
                proveedor: document.getElementById('proveedor').value,
                precio: document.getElementById('importe').value,
                descripcion: `${document.getElementById('tipoDoc').value} | ${currentOCRTags} | Resp: ${user}`,
                firma: "N/A"
            };
            if(!data.nroFactura || !data.precio) return alert("Faltan datos");
            
            btn.innerText = "AUDITANDO..."; btn.disabled = true;
            try {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                clearForm();
                await loadHistory();
                alert("✅ Registro guardado con éxito");
            } catch(e) { alert("Error al guardar"); }
            finally { btn.innerText = "GUARDAR EN NUBE"; btn.disabled = false; }
        }

        function updateHistoryList() {
            document.getElementById('historyList').innerHTML = history.slice(-15).reverse().map(f => `
                <div class="glass p-4 rounded-2xl border-l-4 ${f.descripcion.includes('FACTURA') ? 'border-blue-500' : 'border-green-500'}">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-blue-400 text-sm uppercase">${f.proveedor}</p>
                        <p class="text-[12px] text-green-400 font-bold">$${f.precio}</p>
                    </div>
                    <p class="text-[10px] font-bold mt-1 opacity-60 uppercase">N° ${f.nroFactura} | ${f.descripcion.split('|')[1] || 'NORMAL'}</p>
                </div>
            `).join('');
        }

        function toggleView(view) {
            document.querySelectorAll('.modal-view').forEach(v => v.classList.remove('active-view'));
            if(view !== 'app') document.getElementById(`view-${view}`).classList.add('active-view');
        }

        function clearForm() {
            document.getElementById('nroFactura').value = "";
            document.getElementById('proveedor').value = "";
            document.getElementById('importe').value = "";
            document.getElementById('ia-status').classList.add('hidden');
            currentOCRTags = "NORMAL";
        }

        function startScan() {
            const reader = document.getElementById('reader');
            reader.classList.remove('hidden');
            const sc = new Html5Qrcode("reader");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('nroFactura').value = txt;
                sc.stop(); reader.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
