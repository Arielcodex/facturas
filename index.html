<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arielcodex - Admin Panel</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        :root { --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #1f2937; }
        .dark-mode { --bg-color: #111827; --card-bg: #1f2937; --text-main: #f9fafb; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: all 0.3s ease; }
        .glass { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 min-h-screen">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-extrabold tracking-tight text-blue-500">ARIELCODEX<span class="text-gray-400 font-light">.sys</span></h1>
            <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 transition-colors">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
        
        <div class="glass rounded-3xl p-6 shadow-xl mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-xs uppercase tracking-widest text-gray-500 font-bold">Productividad</p>
                    <h2 class="text-sm text-gray-400">Facturas procesadas hoy</h2>
                </div>
                <div id="contador" class="text-4xl font-black text-blue-500">0</div>
            </div>
            
            <div class="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-1.5">
                <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="glass rounded-3xl p-6 shadow-xl space-y-4">
            <div id="reader" class="rounded-2xl overflow-hidden mb-2"></div>
            
            <button onclick="startScanner()" class="w-full py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                📸 Escanear Código
            </button>

            <div class="space-y-3">
                <input type="text" id="nroFactura" placeholder="N° de Comprobante" class="w-full p-4 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="proveedor" placeholder="Proveedor / Empresa" class="w-full p-4 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="descripcion" placeholder="Descripción del servicio" class="w-full p-4 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="number" id="precio" placeholder="Importe ($)" class="w-full p-4 rounded-xl border-none bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold text-green-500">
            </div>
            
            <button onclick="enviarDatos()" id="btnEnviar" class="w-full py-4 rounded-2xl bg-green-500 text-white font-black text-lg shadow-lg hover:bg-green-600 transition-colors">
                GUARDAR REGISTRO
            </button>
        </div>

        <div class="mt-6">
            <input type="text" id="busqueda" placeholder="🔍 Buscar en el historial..." class="w-full p-4 bg-transparent border-b-2 border-gray-300 dark:border-gray-700 focus:border-blue-500 outline-none transition-colors">
        </div>
    </div>

    <script>
        const API_URL = "TU_URL_DE_GOOGLE_SCRIPT_AQUI"; // Recordá pegar tu URL aquí
        let count = 0;

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        function startScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                document.getElementById('nroFactura').value = text;
                html5QrCode.stop();
                // Aquí podrías agregar la lógica para "adivinar" el proveedor
            });
        }

        async function enviarDatos() {
            const btn = document.getElementById('btnEnviar');
            btn.innerHTML = "PROCESANDO...";
            
            const datos = {
                nroFactura: document.getElementById('nroFactura').value,
                proveedor: document.getElementById('proveedor').value,
                descripcion: document.getElementById('descripcion').value,
                precio: document.getElementById('precio').value
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
                count++;
                document.getElementById('contador').innerText = count;
                document.getElementById('progress-bar').style.width = (count * 10) + '%'; // Sube 10% por cada factura
                limpiar();
                alert("✅ Registro guardado en Arielcodex Cloud");
            } catch (e) { alert("❌ Error de conexión"); }
            btn.innerHTML = "GUARDAR REGISTRO";
        }

        function limpiar() {
            ['nroFactura','proveedor','descripcion','precio'].forEach(id => document.getElementById(id).value = "");
        }
    </script>
</body>
</html>
