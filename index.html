<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL INTERNO - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .modal-view { display: none; position: fixed; inset: 0; z-index: 100; background: #0f172a; overflow-y: auto; }
        .active-view { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4">

    <div id="login-screen" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center">
            <h1 class="text-blue-500 font-black text-2xl mb-6">CONTROL INTERNO</h1>
            <input type="text" id="userInput" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 mb-2 text-center uppercase outline-none">
            <button onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black">INGRESAR</button>
        </div>
    </div>

    <div id="app" class="max-w-7xl mx-auto hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-4">
                <div class="glass rounded-3xl p-6 border-b-4 border-blue-500 space-y-4">
                    <input type="text" id="nroFactura" placeholder="N° Comprobante *" class="w-full p-4 rounded-xl bg-slate-800 outline-none">
                    <input type="text" id="proveedor" oninput="this.value = this.value.toUpperCase(); updateUILists();" placeholder="DROGUERÍA *" class="w-full p-4 rounded-xl bg-slate-800 outline-none text-blue-400 font-bold">
                    <input type="number" id="importe" placeholder="TOTAL *" class="w-full p-4 rounded-xl bg-slate-800 font-bold text-green-400 text-2xl outline-none">
                    <button id="btnSave" onclick="saveData()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase">GUARDAR</button>
                </div>
                <button onclick="toggleView('history')" class="w-full py-4 glass rounded-2xl font-black text-xs uppercase">Ver Historial Completo</button>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase px-2">Monitor en Vivo</h3>
                <div id="liveList" class="space-y-3"></div>
            </div>

            <div class="lg:col-span-1 space-y-4">
                <h3 class="text-xs font-black text-gray-400 uppercase px-2">Estadísticas</h3>
                <div class="glass p-6 rounded-3xl"><canvas id="chartPie"></canvas></div>
            </div>
        </div>
    </div>

    <div id="view-history" class="modal-view p-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-blue-500">HISTORIAL COMPLETO</h3>
                <button onclick="toggleView('app')" class="p-4 bg-slate-800 rounded-full">✕</button>
            </div>
            <div id="fullHistoryList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const API = "TU_URL_AQUI"; // REEMPLAZA CON LA NUEVA URL
        let historyData = [];
        let user = "";

        function login() {
            user = document.getElementById('userInput').value.toUpperCase();
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                loadHistory();
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                historyData = await res.json();
                updateUILists();
                renderCharts();
            } catch(e) { console.error("Error cargando datos"); }
        }

        function updateUILists() {
            const query = document.getElementById('proveedor').value.toLowerCase();
            const filtered = historyData.filter(f => f.proveedor.toLowerCase().includes(query)).reverse();
            
            const renderCard = (f) => `
                <div class="glass p-4 rounded-2xl border-l-4 border-green-500 animate-fadeIn">
                    <div class="flex justify-between">
                        <span class="font-black text-blue-400 uppercase">${f.proveedor}</span>
                        <span class="font-bold text-green-400">$${f.precio}</span>
                    </div>
                    <p class="text-[10px] opacity-50 font-bold mt-1 uppercase">N° ${f.nroFactura} | ${f.fecha || ''}</p>
                </div>`;

            document.getElementById('liveList').innerHTML = filtered.slice(0, 10).map(renderCard).join('') || "<p class='opacity-30 text-center'>SIN DATOS</p>";
            document.getElementById('fullHistoryList').innerHTML = filtered.map(renderCard).join('');
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const payload = {
                fechaLocal: new Date().toLocaleString('es-AR'),
                nroFactura: document.getElementById('nroFactura').value,
                proveedor: document.getElementById('proveedor').value.toUpperCase(),
                precio: document.getElementById('importe').value,
                descripcion: `CARGA APP | ${user}`,
                estado: "CARGADO"
            };

            if(!payload.nroFactura || !payload.proveedor || !payload.precio) return alert("Faltan datos");

            btn.disabled = true; btn.innerText = "GUARDANDO...";
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            
            document.getElementById('nroFactura').value = "";
            document.getElementById('importe').value = "";
            btn.disabled = false; btn.innerText = "GUARDAR";
            
            setTimeout(loadHistory, 1500);
        }

        function toggleView(view) {
            document.getElementById('view-history').classList.toggle('active-view', view === 'history');
        }

        function renderCharts() {
            const ctx = document.getElementById('chartPie').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            const counts = {};
            historyData.forEach(f => counts[f.proveedor] = (counts[f.proveedor] || 0) + 1);
            window.myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{ data: Object.values(counts), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#6366f1'] }]
                },
                options: { plugins: { legend: { labels: { color: 'white', font: { size: 10 } } } } }
            });
        }
    </script>
</body>
</html>
