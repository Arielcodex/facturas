<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arielcodex PRO v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #signature-pad { border: 2px dashed #3b82f6; background: white; cursor: crosshair; touch-action: none; }
        .offline-badge { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-3xl w-80 text-center border-t-4 border-blue-500">
            <h1 class="text-blue-500 font-black text-3xl tracking-tighter mb-2">ARIELCODEX</h1>
            <p class="text-[9px] text-gray-500 uppercase font-bold mb-6 tracking-widest">Acceso Privado</p>
            <div class="space-y-3">
                <input type="text" id="userInput" placeholder="USUARIO" class="w-full p-4 rounded-xl bg-slate-800 border-none text-center uppercase font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="passInput" placeholder="CLAVE" class="w-full p-4 rounded-xl bg-slate-800 border-none text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full py-4 bg-blue-600 rounded-xl font-black shadow-lg hover:bg-blue-500 transition-all">INGRESAR</button>
            </div>
            <p id="errorLogin" class="hidden text-red-500 text-[10px] mt-4 font-bold uppercase italic">Credenciales incorrectas</p>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto hidden">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 class="text-xl font-black text-blue-500">ARIELCODEX.sys</h2>
                <p id="userDisplay" class="text-[10px] font-bold opacity-60 uppercase tracking-widest"></p>
            </div>
            <div class="text-right glass p-2 rounded-xl border-l-4 border-green-500">
                <p class="text-[8px] font-bold text-gray-400 uppercase">Hoy</p>
                <p id="statsToday" class="text-lg font-black text-green-400">0</p>
            </div>
        </div>

        <div id="offlineSync" class="hidden mb-4 p-3 bg-orange-500 rounded-2xl text-center font-black text-[10px] offline-badge cursor-pointer" onclick="syncOfflineData()">
            ⚠️ REGISTROS SIN SUBIR (TOCA AQUÍ)
        </div>

        <div class="glass rounded-3xl p-6 shadow-2xl mb-6 space-y-4 border-b-4 border-blue-500">
            <div id="reader" class="rounded-2xl overflow-hidden hidden mb-4 bg-black"></div>
            <div class="flex gap-2">
                <button onclick="startScan()" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold text-[10px] uppercase">📸 Escanear QR</button>
                <select id="tipoDoc" class="bg-slate-800 rounded-xl px-2 text-[10px] font-bold uppercase outline-none">
                    <option value="FACTURA">Factura</option>
                    <option value="REMITO">Remito</option>
                    <option value="NC">Nota Crédito</option>
                </select>
            </div>
            <div class="relative">
                <input type="text" id="nroFactura" oninput="checkDuplicate()" placeholder="N° Comprobante" class="w-full p-4 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500">
                <p id="dupAlert" class="hidden text-[9px] text-red-500 font-bold mt-1 uppercase">⚠️ Ya cargado previamente</p>
            </div>
            <input type="text" id="proveedor" placeholder="Droguería / Proveedor" class="w-full p-4 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500">
            <div class="space-y-2">
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Firma de conformidad:</p>
                <canvas id="signature-pad" class="w-full h-32 rounded-xl"></canvas>
                <button onclick="clearSignature()" class="text-[8px] text-gray-500 uppercase font-bold underline">Limpiar</button>
            </div>
            <button id="btnSave" onclick="saveData()" class="w-full py-4 bg-slate-700 rounded-2xl font-black transition-all">GUARDAR REGISTRO</button>
        </div>

        <div class="space-y-4">
            <input type="text" id="search" oninput="filterData()" placeholder="🔍 Buscar..." class="w-full p-4 rounded-2xl glass outline-none">
            <div class="flex gap-2">
                <button onclick="generateReport('whatsapp')" class="flex-1 py-3 bg-green-600 rounded-xl text-[10px] font-black uppercase">WhatsApp PDF</button>
                <button onclick="generateReport('email')" class="flex-1 py-3 bg-indigo-600 rounded-xl text-[10px] font-black uppercase">Email PDF</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // DIRECCIÓN INSERTADA
        const API = "https://script.google.com/macros/s/AKfycbw-nua5x1TEV3bPT9X6F6lOauMFHxU7BaGneWPyy-LMvp42CzVfBiicQ1OWyzqkfV2TPg/exec";
        
        let history = [];
        let sessionData = [];
        let user = "";
        let coords = { lat: 0, lon: 0 };

        function login() {
            const userIn = document.getElementById('userInput').value.trim().toUpperCase();
            const passIn = document.getElementById('passInput').value.trim();
            if ((userIn === "ESTEBAN" || userIn === "OMAR") && passIn === "5678") {
                user = userIn;
                sessionStorage.setItem('arielcodex_user', user); 
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `OPERADOR: ${user}`;
                initGeo(); initSignature(); loadHistory();
            } else {
                document.getElementById('errorLogin').classList.remove('hidden');
            }
        }

        function initGeo() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    coords.lat = p.coords.latitude; coords.lon = p.coords.longitude;
                });
            }
        }

        let canvas, ctx, drawing = false;
        function initSignature() {
            canvas = document.getElementById('signature-pad');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const start = (e) => { drawing = true; ctx.beginPath(); draw(e); };
            const end = () => { drawing = false; };
            const move = (e) => { if(drawing) draw(e); };
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', (e) => { start(e.touches[0]); e.preventDefault(); });
            canvas.addEventListener('touchmove', (e) => { move(e.touches[0]); e.preventDefault(); });
            canvas.addEventListener('touchend', end);
        }

        function draw(e) {
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function clearSignature() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        async function loadHistory() {
            try {
                const res = await fetch(API);
                history = await res.json();
                updateStats(); filterData();
            } catch(e) { console.log("Offline"); }
        }

        function checkDuplicate() {
            const nro = document.getElementById('nroFactura').value;
            const exists = history.some(f => f.nroFactura.toString() === nro.toString());
            document.getElementById('nroFactura').classList.toggle('ring-red-500', exists);
            document.getElementById('nroFactura').classList.toggle('ring-2', exists);
            document.getElementById('dupAlert').classList.toggle('hidden', !exists);
        }

        async function saveData() {
            const btn = document.getElementById('btnSave');
            const data = {
                nroFactura: document.getElementById('nroFactura').value,
                proveedor: document.getElementById('proveedor').value,
                descripcion: `${document.getElementById('tipoDoc').value} | Resp: ${user} | GPS: ${coords.lat},${coords.lon}`,
                precio: "0", firma: canvas.toDataURL()
            };
            if(!data.nroFactura || !data.proveedor) return alert("Faltan datos");
            btn.innerText = "ENVIANDO..."; btn.disabled = true;
            try {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                sessionData.push(data); clearForm(); await loadHistory();
            } catch(e) { saveOffline(data); }
            finally { btn.innerText = "GUARDAR REGISTRO"; btn.disabled = false; }
        }

        function saveOffline(data) {
            let offline = JSON.parse(localStorage.getItem('ariel_off') || "[]");
            offline.push(data);
            localStorage.setItem('ariel_off', JSON.stringify(offline));
            document.getElementById('offlineSync').classList.remove('hidden');
            clearForm();
        }

        async function syncOfflineData() {
            let offline = JSON.parse(localStorage.getItem('ariel_off') || "[]");
            for(let item of offline) { await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) }); }
            localStorage.removeItem('ariel_off');
            document.getElementById('offlineSync').classList.add('hidden');
            await loadHistory();
        }

        async function generateReport(method) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const busq = document.getElementById('search').value;
            const source = busq ? history.filter(f => JSON.stringify(f).toLowerCase().includes(busq.toLowerCase())) : sessionData;
            if(source.length === 0) return alert("Sin datos");
            doc.setFontSize(20); doc.setTextColor(59, 130, 246); doc.text("ARIELCODEX PRO REPORT", 14, 20);
            doc.autoTable({
                startY: 35,
                head: [['Comprobante', 'Proveedor', 'Detalle']],
                body: source.map(f => [f.nroFactura, f.proveedor, f.descripcion]),
            });
            const blob = doc.output('blob');
            const file = new File([blob], `Reporte_${user}.pdf`, { type: "application/pdf" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Reporte Arielcodex' });
            } else { doc.save(`Reporte_Arielcodex.pdf`); }
        }

        function updateStats() {
            const hoy = new Date().toLocaleDateString();
            const count = history.filter(f => f.descripcion.includes(hoy)).length;
            document.getElementById('statsToday').innerText = count;
        }

        function filterData() {
            const t = document.getElementById('search').value.toLowerCase();
            const list = t === "" ? history.slice(-5).reverse() : history.filter(f => JSON.stringify(f).toLowerCase().includes(t)).reverse();
            document.getElementById('historyList').innerHTML = list.map(f => `
                <div class="glass p-4 rounded-2xl border-l-4 ${f.descripcion.includes('FACTURA') ? 'border-blue-500' : 'border-green-500'}">
                    <p class="font-black text-blue-400 text-sm uppercase">${f.proveedor}</p>
                    <p class="text-xs font-bold mt-1">N° ${f.nroFactura}</p>
                </div>
            `).join('');
        }

        function clearForm() {
            document.getElementById('nroFactura').value = "";
            document.getElementById('proveedor').value = "";
            clearSignature();
        }

        function startScan() {
            const reader = document.getElementById('reader');
            reader.classList.remove('hidden');
            const sc = new Html5Qrcode("reader");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('nroFactura').value = txt;
                sc.stop(); reader.classList.add('hidden');
                checkDuplicate();
            });
        }
    </script>
</body>
</html>
